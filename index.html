<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Arcus Infrastructure Atlas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div id="sidebar">
      <div id="sidebar-header">
        <h2 id="region-title">Select a State</h2>
        <p id="sidebar-subtitle">
          Click a state to see Arcus-tracked laws, articles, and updates.
        </p>
      </div>

      <div id="stats">
        <div class="stat">
          <div class="statLabel">Regions with activity</div>
          <div class="statValue" id="statStates">—</div>
        </div>
        <div class="stat">
          <div class="statLabel">Entries (filtered)</div>
          <div class="statValue" id="statEntries">—</div>
        </div>
      </div>

      <div id="filters">
        <div class="field">
          <label for="viewMode">View</label>
          <select id="viewMode">
            <option value="state">State</option>
            <option value="iso">ISO / RTO</option>
          </select>
        </div>

        <div class="field">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="field">
          <label for="sortOrder">Sort</label>
          <select id="sortOrder">
            <option value="desc">Newest</option>
            <option value="asc">Oldest</option>
          </select>
        </div>
      </div>

      <div id="searchWrap">
        <input id="searchInput" type="text" placeholder="Search titles & summaries…" />
      </div>

      <div id="entries"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
