<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arcus — Data Center Signals Map</title>

  <!-- Mapbox GL -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <div class="brand__title">Arcus Map</div>
      <div class="brand__subtitle">State risk + policy / grid / water / development signals</div>
    </div>

    <div class="controls">
      <div class="control">
        <label>View</label>
        <div class="segmented">
          <button id="btnViewState" class="segmented__btn segmented__btn--active">States</button>
          <button id="btnViewIso" class="segmented__btn">ISO/RTO</button>
        </div>
      </div>

      <div class="control">
        <label>State</label>
        <input id="stateSearch" type="text" placeholder="Search (e.g., Virginia)" />
      </div>

      <div class="control">
        <label>Category</label>
        <select id="filterCategory"></select>
      </div>

      <div class="control">
        <label>Impact</label>
        <select id="filterImpact"></select>
      </div>

      <div class="control">
        <label>Signal Type</label>
        <select id="filterType"></select>
      </div>

      <div class="control">
        <label>Direction</label>
        <select id="filterDirection"></select>
      </div>

      <div class="control">
        <label>Signal Category</label>
        <select id="filterSignalCategory"></select>
      </div>

      <div class="control">
        <button id="btnClear" class="btn">Clear filters</button>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <aside id="panel" class="panel panel--hidden">
    <div class="panel__header">
      <div>
        <div id="panelState" class="panel__title">State</div>
        <div id="panelMeta" class="panel__meta"></div>
      </div>
      <button id="panelClose" class="panel__close" aria-label="Close">✕</button>
    </div>

    <div class="panel__section">
      <div class="panel__sectionTitle">Top Risk Signals</div>
      <ul id="panelTopSignals" class="list"></ul>
    </div>

    <div class="panel__section">
      <div class="panel__sectionTitle">Matching Entries</div>
      <div id="panelEntriesHint" class="hint"></div>
      <ul id="panelEntries" class="list list--entries"></ul>
    </div>
  </aside>

  <script>
    // Replace with your Mapbox token
    window.MAPBOX_TOKEN = "PASTE_YOUR_MAPBOX_TOKEN_HERE";
  </script>
  <script src="./script.js"></script>
</body>
</html>
